version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: docsmart-postgres
    environment:
      POSTGRES_USER: docsmart
      POSTGRES_PASSWORD: docsmart
      POSTGRES_DB: docsmart
    ports:
      - "5432:5432"
    volumes:
      - .:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
